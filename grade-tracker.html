<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade Tracker</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
}

h1 {
    text-align: center;
}

/* INPUT SECTION */
.input-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.input-group input {
    width: 60%;
    max-width: 400px;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #020617;
    color: white;
}

.btn-group {
    display: flex;
    gap: 10px;
}

button {
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.add { background: #22c55e; }
.clear { background: #ef4444; }
.edit { background: #3b82f6; color: white; }
.delete { background: #ef4444; color: white; }

/* SEARCH */
.search {
    display: block;
    margin: 20px auto;
    width: 60%;
    padding: 12px;
    border-radius: 8px;
    background: #020617;
    color: white;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
    flex-wrap: wrap;
}

.card {
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    margin: 5px;
    min-width: 150px;
    text-align: center;
}

/* TABLE */
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #334155;
    text-align: center;
}

.top {
    background: rgba(34,197,94,0.2);
}

/* HISTORY */
.history {
    margin-top: 25px;
    font-size: 0.9rem;
}

@media(max-width:600px){
    .input-group input, .search {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎓 Student Grade Tracker</h1>

    <!-- INPUT -->
    <div class="input-group">
        <input id="name" placeholder="Student Name">
        <input id="marks" type="number" placeholder="Marks">

        <div class="btn-group">
            <button class="add" onclick="addStudent()">Add</button>
            <button class="clear" onclick="clearAll()">Clear</button>
        </div>
    </div>

    <!-- SEARCH -->
    <input class="search" id="search" placeholder="Search student..." oninput="displayStudents()">

    <!-- DASHBOARD -->
    <div class="dashboard">
        <div class="card" id="avgCard">Avg: 0</div>
        <div class="card" id="totalCard">Total: 0</div>
        <div class="card" id="topCard">Top: -</div>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Marks</th>
                <th>Grade</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <!-- HISTORY -->
    <div class="history">
        <h3>🕘 Activity Log</h3>
        <div id="log"></div>
    </div>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let log = JSON.parse(localStorage.getItem("log")) || [];

/* Grade */
function getGrade(m) {
    if (m >= 80) return "A";
    if (m >= 70) return "B";
    if (m >= 60) return "C";
    if (m >= 50) return "D";
    return "F";
}

/* Log */
function addLog(msg) {
    log.unshift(msg);
    localStorage.setItem("log", JSON.stringify(log));
    displayLog();
}

/* Add */
function addStudent() {
    let name = document.getElementById("name").value.trim();
    let marks = parseInt(document.getElementById("marks").value);

    if (!name || isNaN(marks)) return alert("Enter valid data");

    students.push({ name, marks, grade: getGrade(marks) });
    addLog(`Added ${name} (${marks})`);
    save();
}

/* Delete */
function deleteStudent(i) {
    if (!confirm("Delete student?")) return;
    addLog(`Deleted ${students[i].name}`);
    students.splice(i, 1);
    save();
}

/* Edit */
function editStudent(i) {
    let name = prompt("Edit name:", students[i].name);
    let marks = prompt("Edit marks:", students[i].marks);

    if (name && !isNaN(marks)) {
        students[i].name = name;
        students[i].marks = parseInt(marks);
        students[i].grade = getGrade(marks);
        addLog(`Updated ${name}`);
        save();
    }
}

/* Save */
function save() {
    localStorage.setItem("students", JSON.stringify(students));
    displayStudents();
}

/* Display */
function displayStudents() {
    let table = document.getElementById("tableBody");
    let search = document.getElementById("search").value.toLowerCase().trim();

    let filtered = students.filter(s =>
        s.name.toLowerCase().includes(search)
    );

    table.innerHTML = "";

    let total = filtered.reduce((sum, s) => sum + s.marks, 0);
    let avg = filtered.length ? (total / filtered.length).toFixed(2) : 0;

    let top = filtered.reduce((max, s) =>
        s.marks > (max?.marks || 0) ? s : max, {}
    );

    filtered.forEach((s, i) => {
        let highlight = s === top ? "top" : "";

        table.innerHTML += `
        <tr class="${highlight}">
            <td>${s.name}</td>
            <td>${s.marks}</td>
            <td>${s.grade}</td>
            <td>
                <button class="edit" onclick="editStudent(${i})">Edit</button>
                <button class="delete" onclick="deleteStudent(${i})">Delete</button>
            </td>
        </tr>`;
    });

    document.getElementById("avgCard").innerText = "Avg: " + avg;
    document.getElementById("totalCard").innerText = "Total: " + filtered.length;
    document.getElementById("topCard").innerText =
        top.name ? `Top: ${top.name}` : "Top: -";
}

/* Log display */
function displayLog() {
    document.getElementById("log").innerHTML =
        log.slice(0,5).map(l => `<div>${l}</div>`).join("");
}

/* Clear */
function clearAll() {
    if (!confirm("Clear all data?")) return;
    students = [];
    log = [];
    save();
    displayLog();
}

/* Init */
displayStudents();
displayLog();
</script>

</body>
</html>
