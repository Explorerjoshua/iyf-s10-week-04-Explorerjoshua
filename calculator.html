<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Calculator</title>

<style>
:root {
    --bg: #0f172a;
    --panel: #1e293b;
    --display: #020617;
    --text: #e2e8f0;
    --accent: #22c55e;
}

body.light {
    --bg: #f1f5f9;
    --panel: #ffffff;
    --display: #e2e8f0;
    --text: #0f172a;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Layout */
.container {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

/* Calculator */
.calculator {
    background: var(--panel);
    padding: 20px;
    border-radius: 15px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: fadeIn 0.5s ease;
}

.display {
    background: var(--display);
    padding: 15px;
    font-size: 2rem;
    text-align: right;
    border-radius: 10px;
    margin-bottom: 15px;
    overflow-x: auto;
}

/* Buttons */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    padding: 15px;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

.number { background: #334155; color: white; }
.operator { background: #f59e0b; color: white; }
.equals { background: var(--accent); color: white; grid-column: span 2; }
.clear { background: #ef4444; color: white; grid-column: span 2; }

/* History */
.history {
    background: var(--panel);
    padding: 15px;
    border-radius: 15px;
    width: 200px;
    max-height: 400px;
    overflow-y: auto;
}

.history h3 {
    margin-top: 0;
}

.history-item {
    font-size: 0.9rem;
    margin-bottom: 5px;
    opacity: 0.8;
}

/* Top bar */
.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.toggle {
    cursor: pointer;
    font-size: 0.9rem;
    padding: 5px 10px;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}

/* Mobile */
@media(max-width: 600px) {
    .container {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- Calculator -->
    <div class="calculator">
        <div class="top-bar">
            <div>Calculator</div>
            <div class="toggle" onclick="toggleTheme()"></div>
        </div>

        <div id="display" class="display">0</div>

        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="append('/')">÷</button>
            <button class="operator" onclick="append('*')">×</button>

            <button class="number" onclick="append('7')">7</button>
            <button class="number" onclick="append('8')">8</button>
            <button class="number" onclick="append('9')">9</button>
            <button class="operator" onclick="append('-')">−</button>

            <button class="number" onclick="append('4')">4</button>
            <button class="number" onclick="append('5')">5</button>
            <button class="number" onclick="append('6')">6</button>
            <button class="operator" onclick="append('+')">+</button>

            <button class="number" onclick="append('1')">1</button>
            <button class="number" onclick="append('2')">2</button>
            <button class="number" onclick="append('3')">3</button>
            <button class="number" onclick="append('0')">0</button>

            <button class="number" onclick="append('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <!-- History Panel -->
    <div class="history">
        <h3>History</h3>
        <div id="historyList"></div>
    </div>

</div>

<script>
let display = document.getElementById("display");
let historyList = document.getElementById("historyList");

// Load last result
if (localStorage.getItem("lastResult")) {
    display.innerText = localStorage.getItem("lastResult");
}

// Append values
function append(value) {
    if (display.innerText === "0") {
        display.innerText = value;
    } else {
        display.innerText += value;
    }
}

// Clear
function clearDisplay() {
    display.innerText = "0";
}

// Safe Calculation (no eval)
function calculate() {
    try {
        let expression = display.innerText
            .replace(/×/g, "*")
            .replace(/÷/g, "/");

        let result = Function('"use strict"; return (' + expression + ')')();

        addHistory(expression + " = " + result);

        display.innerText = result;
        localStorage.setItem("lastResult", result);
    } catch {
        display.innerText = "Error";
    }
}

// History
function addHistory(entry) {
    let div = document.createElement("div");
    div.className = "history-item";
    div.innerText = entry;
    historyList.prepend(div);
}

// Theme toggle
function toggleTheme() {
    document.body.classList.toggle("light");
}

// Keyboard support
document.addEventListener("keydown", function(e) {
    if (!isNaN(e.key) || "+-*/.".includes(e.key)) {
        append(e.key);
    } else if (e.key === "Enter") {
        calculate();
    } else if (e.key === "Backspace") {
        display.innerText = display.innerText.slice(0, -1) || "0";
    } else if (e.key.toLowerCase() === "c") {
        clearDisplay();
    }
});
</script>

</body>
</html>
